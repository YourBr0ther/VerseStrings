name: ci

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 9.0.x

      - name: Restore
        run: dotnet restore VerseStrings.sln

      - name: Build
        run: dotnet build VerseStrings.sln -c Release --no-restore

      - name: Test
        run: dotnet test VerseStrings.sln -c Release --no-build --verbosity normal
