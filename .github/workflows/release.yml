name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 9.0.x

      - name: Extract version from tag
        id: version
        shell: pwsh
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          $version = $env:REF_NAME.TrimStart('v')
          if ($version -notmatch '^\d+\.\d+\.\d+(-[A-Za-z0-9.-]+)?$') {
            throw "Tag '$($env:REF_NAME)' is not a valid semver tag (e.g. v0.1.0)"
          }
          "version=$version" | Out-File $env:GITHUB_OUTPUT -Append
          Write-Host "Version: $version"

      - name: Restore
        run: dotnet restore VerseStrings.sln

      - name: Test
        run: dotnet test VerseStrings.sln -c Release --no-restore --verbosity normal

      - name: Publish self-contained exe
        shell: pwsh
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          dotnet publish src/VerseStrings.App -c Release -r win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -p:Version=$env:VERSION

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Compile installer
        shell: cmd
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: >
          "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          /DAppVersion=%VERSION%
          installer\VerseStrings.iss

      - name: Compute installer SHA-256
        id: hash
        shell: pwsh
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          $path = "dist/VerseStringsSetup-$($env:VERSION).exe"
          $hash = (Get-FileHash $path -Algorithm SHA256).Hash.ToLower()
          "sha256=$hash" | Out-File $env:GITHUB_OUTPUT -Append
          Write-Host "SHA-256: $hash"

      - name: Create GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REF_NAME: ${{ github.ref_name }}
          VERSION: ${{ steps.version.outputs.version }}
          SHA: ${{ steps.hash.outputs.sha256 }}
        run: |
          $notes = @"
          ## Install

          Download ``VerseStringsSetup-$($env:VERSION).exe`` and run it. Per-user install, no admin required.

          SmartScreen may warn that the publisher is unverified — click **More info** → **Run anyway**.

          ## Checksum

          ``````
          SHA-256  $($env:SHA)
          ``````
          "@
          $notes | Out-File release-notes.md -Encoding utf8
          $asset = "dist/VerseStringsSetup-$($env:VERSION).exe"
          gh release create $env:REF_NAME --title $env:REF_NAME --notes-file release-notes.md $asset
