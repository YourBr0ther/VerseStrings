name: Bug report
description: Something the app does wrong, fails to do, or crashes on.
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. The more of this you can fill
        in, the faster it gets diagnosed.

  - type: input
    id: app-version
    attributes:
      label: VerseStrings version
      description: Tray menu → status row, or the installer filename (`VerseStringsSetup-X.Y.Z.exe`).
      placeholder: e.g. 0.1.1
    validations:
      required: true

  - type: input
    id: windows-version
    attributes:
      label: Windows version
      description: Settings → System → About → Windows specifications.
      placeholder: e.g. Windows 11 23H2
    validations:
      required: true

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did the app do, and what did you expect instead?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open the tray menu …
        2. Click …
        3. Observe …

  - type: textarea
    id: settings
    attributes:
      label: settings.json contents (optional, but useful)
      description: |
        From `%APPDATA%\VerseStrings\settings.json`. Strip anything you don't want public.
      render: json

  - type: textarea
    id: extra
    attributes:
      label: Anything else?
      description: Screenshots, toast text, related issues, etc.
